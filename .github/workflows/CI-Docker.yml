name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Versioning (v1, v2, v3...)
      - name: Set Version
        run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

      # ---------------------------
      # Compile Java Files
      # ---------------------------
      - name: Compile Java
        run: |
          mkdir -p build/classes
          javac -d build/classes app.java calculator.java

      # ---------------------------
      # Upload Artifacts (both files)
      # ---------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-build
          path: |
            build/classes

      # ---------------------------
      # Sonar Qube Code Scanning
      # ---------------------------
      # Run Sonar Checks on the repo
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: .
          args: 
            -Dsonar.projectKey=KnightFS85_Personal_Projects
            -Dsonar.organization=knightfs85
            -Dsonar.host.url=https://sonarcloud.io/
            -Dsonar.java.binaries=build/classes
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # ---------------------------
      # Docker Login
      # ---------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}


      # ---------------------------
      # Build Docker Image
      # ---------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_REPONAME }}/java-ci-docker:${{ env.VERSION }} .

      # ---------------------------
      # Push Docker Image
      # ---------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_REPONAME }}/java-ci-docker:${{ env.VERSION }}