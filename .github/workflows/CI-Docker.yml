name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Versioning (v1, v2, v3...)
      - name: Set Version
        run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

      # ---------------------------
      # Compile Java Files
      # ---------------------------
      - name: Compile Java
        run: |
          javac app.java calculator.java

      # ---------------------------
      # Upload Artifacts (both files)
      # ---------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-build
          path: |
            app.class
            calculator.class

      # ---------------------------
      # Docker Login
      # ---------------------------
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ---------------------------
      # Build Docker Image
      # ---------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/java-ci-docker:${{ env.VERSION }} .

      # ---------------------------
      # Push Docker Image
      # ---------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/java-ci-docker:${{ env.VERSION }}